# =====================================================================
#  VirtualHost Apache para o painel Intel EMA Inventory
#  Copie para /etc/apache2/sites-available/ema-inventory.conf
#  Depois:  a2ensite ema-inventory && systemctl reload apache2
# =====================================================================
<VirtualHost *:80>
    ServerName ema-inventory.suaempresa.com.br
    DocumentRoot /var/www/ema-inventory/web

    <Directory /var/www/ema-inventory/web>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Nunca servir config.php como texto (protecao extra alem de ser .php)
    <FilesMatch "config\.php$">
        Require all denied
    </FilesMatch>

    # -----------------------------------------------------------------
    #  PHP-FPM/CGI: repassar o cabecalho Authorization ao PHP para que
    #  $_SERVER['PHP_AUTH_USER'/'PHP_AUTH_PW'] funcionem no modo 'basic'.
    #  (Com PHP como modulo do Apache isso ja e automatico.)
    # -----------------------------------------------------------------
    # <Directory /var/www/ema-inventory/web>
    #     CGIPassAuth On
    #     SetEnvIfNoCase Authorization "(.+)" HTTP_AUTHORIZATION=$1
    # </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/ema-inventory-error.log
    CustomLog ${APACHE_LOG_DIR}/ema-inventory-access.log combined
</VirtualHost>

# =====================================================================
#  OPCAO A - Basic Auth no proprio Apache (alternativa ao mode='basic')
#  Deixe config.php com auth.mode='sso' e sso_header='REMOTE_USER' para
#  que o painel confie no usuario autenticado pelo Apache.
# ---------------------------------------------------------------------
#   htpasswd -c /etc/apache2/ema.htpasswd usuario
#
#   <Directory /var/www/ema-inventory/web>
#       AuthType Basic
#       AuthName "Intel EMA Inventory"
#       AuthUserFile /etc/apache2/ema.htpasswd
#       Require valid-user
#   </Directory>

# =====================================================================
#  OPCAO B - SSO via OpenID Connect (mod_auth_openidc)
#  Ex.: Azure AD, Okta, Keycloak, Google Workspace.
#  Deixe config.php com auth.mode='sso' e sso_header='REMOTE_USER'
#  (mod_auth_openidc popula REMOTE_USER com a identidade).
# ---------------------------------------------------------------------
#   OIDCProviderMetadataURL https://SEU_IDP/.well-known/openid-configuration
#   OIDCClientID            SEU_CLIENT_ID
#   OIDCClientSecret        SEU_CLIENT_SECRET
#   OIDCRedirectURI         https://ema-inventory.suaempresa.com.br/redirect_uri
#   OIDCCryptoPassphrase    UMA_FRASE_ALEATORIA
#   OIDCRemoteUserClaim     preferred_username
#
#   <Location />
#       AuthType openid-connect
#       Require valid-user
#   </Location>

# Recomendado: habilitar HTTPS com Let's Encrypt (certbot --apache)
# e redirecionar todo trafego :80 -> :443.
