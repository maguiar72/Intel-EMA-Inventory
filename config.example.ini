; =====================================================================
;  Configuracao do coletor Intel EMA  ->  copie para config.ini
; =====================================================================

[ema]
; URL base do servidor Intel EMA (sem barra no final)
base_url   = https://ema.suaempresa.com.br

; -------------------------------------------------------------------
;  Autenticacao
;  auth_flow = client_credentials  -> system-to-system (equivale ao
;              -useCCAuth do PowerShell). PADRAO no EMA recente.
;  auth_flow = password            -> Resource Owner (usuario/senha).
; -------------------------------------------------------------------
auth_flow = client_credentials

; Para auth_flow=client_credentials:
;   client_id     = GUID gerado no EMA (ex: 7072333b-17be-41a6-940a-6118532a12f1)
;   client_secret = segredo gerado junto com o client_id (NAO e a senha do usuario)
;   scope         = opcional; no client credentials as permissoes vem do scope
client_id     = 7072333b-17be-41a6-940a-6118532a12f1
client_secret = SEU_CLIENT_SECRET
scope         =

; Para auth_flow=password (usados somente nesse fluxo):
username   = amt-tenant@trf3.jus.br
password   = SENHA_DO_USUARIO_API

; Verificar certificado TLS. Use false apenas em laboratorio/self-signed.
verify_ssl = true
; Versao da API usada nos caminhos: latest | v3 | v2
api_version = latest
; Tamanho de pagina ao percorrer listas grandes
page_size  = 200
; Coletar inventario de hardware por dispositivo. O hardware e lido do
; Intel AMT em tempo real (HardwareInfoFromAmt) apenas dos hosts conectados,
; e exige credencial com scope EndpointManager.
collect_hardware = true
; Nro de consultas de hardware simultaneas (threads). A consulta AMT e lenta
; (~1-2s/host); paralelizar reduz drasticamente o tempo total. 16 e um bom
; padrao; aumente com cautela p/ nao sobrecarregar o servidor EMA.
hardware_workers = 16
; Timeout de cada requisicao (segundos)
timeout    = 60

[database]
host     = 127.0.0.1
port     = 3306
name     = ema_inventory
user     = ema_collector
password = TROQUE_ESTA_SENHA

[log]
; DEBUG | INFO | WARNING | ERROR
level = INFO
file  = /var/log/ema-inventory/collector.log

; ===========================================================================
;  Coletor de auditoria (ema_audit_collector.py) -> OpenSearch
;  Reaproveita a secao [ema] p/ conexao/auth. Se o AuditEvents retornar 403,
;  aponte --config p/ um config com credencial de scope TenantManager.
; ===========================================================================
[audit]
; Caminho do recurso de auditoria na API. Confirme no seu Swagger (tag
; AuditEvents) e rode 'ema_audit_collector.py --probe' p/ validar o formato.
path          = auditEvents
; Itens por pagina
page_size     = 500
; Parametro de data inicial p/ busca incremental (confirme no Swagger; pode
; ser startDate, fromDate, from, since...). Deixe vazio p/ nao filtrar por data.
from_param    = startDate
; Parametros de paginacao (variam por versao: $top/$skip, count/start, limit/offset)
top_param     = $top
skip_param    = $skip
; Janela inicial (horas) na 1a execucao, quando ainda nao ha cursor
lookback_hours = 24
; Arquivo de estado do cursor (relativo ao diretorio do config, se sem caminho)
state_file    = ema_audit_state.json

[opensearch]
url        = https://localhost:9200
index      = ema-audit
username   = admin
password   = TROQUE_ESTA_SENHA
verify_ssl = false
timeout    = 60
